<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Mental Health Assessment | MindCare Enterprise</title>
    <link rel="stylesheet" href="home.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Specialized styles for Counseling Page */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-soft);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: var(--shadow-premium);
        }

        .assessment-card {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .assessment-card.active {
            display: block;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: var(--surface-grey);
            border-radius: 10px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-indigo));
            width: 0%;
            transition: width 0.3s ease;
        }

        .chat-window {
            height: 600px;
            display: flex;
            flex-direction: column;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-soft);
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            background: var(--surface-grey);
        }

        .message {
            max-width: 80%;
            padding: 1.25rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .message-ai {
            align-self: flex-start;
            background: white;
            color: var(--text-dark);
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
        }

        .message-user {
            align-self: flex-end;
            background: var(--brand-blue);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .chat-input-area {
            padding: 1.5rem;
            background: white;
            display: flex;
            gap: 1rem;
            border-top: 1px solid var(--border-soft);
        }

        .chat-input {
            flex: 1;
            padding: 1rem 1.5rem;
            border: 1px solid var(--border-soft);
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--brand-blue);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body style="background: var(--surface-grey);">
    <nav class="navbar-corp">
        <div class="container nav-content">
            <a href="index.html" class="logo-corp">
                <i class="fas fa-brain"></i>
                <span>MindCare AI</span>
            </a>
            <div class="nav-links-corp">
                <a href="index.html">Home</a>
                <a href="about.html">About</a>
                <a href="counseling.html" class="btn-corp btn-primary-corp">Support</a>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 140px; padding-bottom: 80px; max-width: 900px;">
        
        <!-- Phase 1: User Onboarding -->
        <div id="userInfoPhase" class="glass-panel active">
            <span class="badge-corp">Step 01</span>
            <h2 class="section-h2-corp" style="text-align: left;">Welcome to Professional Support</h2>
            <p class="hero-p-corp">Please provide your details to begin the diagnostic assessment.</p>
            
            <form id="userInfoForm" style="margin-top: 2rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">First Name</label>
                    <input type="text" id="firstName" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-soft);">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Last Name</label>
                    <input type="text" id="lastName" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-soft);">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Corporate Email</label>
                    <input type="email" id="email" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-soft);">
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Department</label>
                    <select id="department" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-soft);">
                        <option value="IT">Engineering / IT</option>
                        <option value="HR">Human Resources</option>
                        <option value="Sales">Sales & Marketing</option>
                        <option value="Finance">Finance</option>
                        <option value="Operations">Operations</option>
                    </select>
                </div>
                <div class="form-group">
                    <label style="display: block; margin-bottom: 0.5rem; font-weight: 600;">Report Recipient</label>
                    <select id="reportTo" required style="width: 100%; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border-soft);">
                        <option value="hr">HR Department</option>
                        <option value="manager">Direct Manager</option>
                    </select>
                </div>
                <button type="submit" class="btn-corp btn-primary-corp" style="grid-column: span 2; justify-content: center; padding: 1rem;">
                    Begin Assessment <i class="fas fa-arrow-right"></i>
                </button>
            </form>
        </div>

        <!-- Phase 2: DASS-21 Assessment -->
        <div id="assessmentPhase" class="glass-panel" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span class="badge-corp">Assessment Phase</span>
                <span id="questionCounter" style="font-weight: 700; color: var(--brand-blue);">1 / 21</span>
            </div>
            <div class="progress-container"><div id="progressBar" class="progress-bar"></div></div>
            
            <div id="questionArea" style="min-height: 200px;">
                <h3 id="questionText" class="section-h2-corp" style="text-align: left; font-size: 1.8rem; margin-bottom: 2rem;">Loading question...</h3>
                <div id="optionsArea" style="display: grid; gap: 1rem;">
                    <!-- Options injected by JS -->
                </div>
            </div>
        </div>

        <!-- Phase 3: AI Counseling Session -->
        <div id="chatPhase" class="glass-panel" style="display: none;">
            <div style="margin-bottom: 2rem;">
                <span class="badge-corp">Live AI Counseling</span>
                <h2 class="section-h2-corp" style="text-align: left; margin-top: 0.5rem;">Interactive Session</h2>
            </div>
            
            <div class="chat-window">
                <div id="chatMessages" class="chat-messages">
                    <div class="message message-ai">
                        Hello. I've analyzed your DASS-21 results. How are you feeling today?
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" id="chatInput" class="chat-input" placeholder="Share your thoughts...">
                    <button id="sendMessage" class="btn-corp btn-primary-corp"><i class="fas fa-paper-plane"></i></button>
                </div>
            </div>
            
            <div style="margin-top: 2rem; text-align: center;">
                <button id="endSession" class="btn-corp" style="color: var(--danger-color);">End Session & Generate Report</button>
            </div>
        </div>

    </main>

    <script src="counseling.js"></script>
</body>
</html>
